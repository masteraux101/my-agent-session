name: AI Scheduler — musk-daily-digest
on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AI prompt
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo BROWSERAGENT_OUTPUT_BEGIN
          python3 ai-prompt-scheduler-musk-daily-digest.py 2>&1 | tee /tmp/ai_output.txt
          echo BROWSERAGENT_EXIT_CODE=$?
          echo BROWSERAGENT_OUTPUT_END
      - name: Send email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: "768471488@qq.com"
        run: |
          RESULT=$(cat /tmp/ai_output.txt | head -c 4000)
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          SUBJECT="Elon Musk Daily Digest — ${DATE}"
          BODY=$(echo "${RESULT}" | python3 -c "
          import sys, json
          c = sys.stdin.read()
          h = '<div style=\"font-family:sans-serif;line-height:1.6;color:#333;\">' + c.replace('\n', '<br>') + '</div>'
          print(json.dumps({'from':'BrowserAgent <onboarding@resend.dev>','to':['${NOTIFY_EMAIL}'],'subject':'${SUBJECT}','html':h}))
          ")
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${BODY}"