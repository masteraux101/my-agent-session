name: Execute Artifact

on:
  workflow_dispatch:
    inputs:
      entrypoint:
        description: 'Entry point file to execute'
        required: true
        default: 'main.py'
      language:
        description: 'Language runtime (python/node/bash)'
        required: true
        default: 'python'
      args:
        description: 'Extra arguments'
        required: false
        default: ''

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        if: inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        if: inputs.language == 'python' && hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Install Node deps
        if: inputs.language == 'node' && hashFiles('package.json') != ''
        run: npm install

      - name: Execute
        run: |
          case "${{ inputs.language }}" in
            python) python "${{ inputs.entrypoint }}" ${{ inputs.args }} ;;
            node)   node   "${{ inputs.entrypoint }}" ${{ inputs.args }} ;;
            bash|shell|sh) bash "${{ inputs.entrypoint }}" ${{ inputs.args }} ;;
            *) echo "Unsupported: ${{ inputs.language }}" && exit 1 ;;
          esac