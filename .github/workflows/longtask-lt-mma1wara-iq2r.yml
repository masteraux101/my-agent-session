# browseragent-longtask: lt-mma1wara-iq2r
name: "LongTask: lt-mma1wara-iq2r"

on:
  workflow_dispatch:
    inputs:
      iteration:
        description: 'Continuation iteration number'
        required: false
        default: '1'

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography

      - name: Execute long task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LONGTASK_KEY: ${{ secrets.LONGTASK_KEY }}
          TASK_ID: "lt-mma1wara-iq2r"
          ITERATION: ${{ inputs.iteration }}
          MAX_RUNTIME_MINUTES: "340"
          MODEL: "gemini-3-flash-preview"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          WORKFLOW_FILE: "longtask-lt-mma1wara-iq2r.yml"
        run: |
          python artifacts/longtask-lt-mma1wara-iq2r.py

      - name: Commit state
        if: always()
        run: |
          git config user.name "BrowserAgent"
          git config user.email "browseragent@noreply.github.com"
          git add longtask_state/ || true
          git diff --cached --quiet || git commit -m "[longtask] Auto-save state: ${{ env.TASK_ID }} iteration ${{ inputs.iteration }}"
          git push || true