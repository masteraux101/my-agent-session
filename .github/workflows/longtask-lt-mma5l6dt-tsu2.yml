# browseragent-longtask: lt-mma5l6dt-tsu2
name: "LongTask: lt-mma5l6dt-tsu2"

on:
  workflow_dispatch:
    inputs:
      iteration:
        description: 'Continuation iteration number'
        required: false
        default: '1'

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BA_ACCESS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography

      - name: Execute long task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LONGTASK_KEY: ${{ secrets.LONGTASK_KEY }}
          TASK_ID: "lt-mma5l6dt-tsu2"
          ITERATION: ${{ inputs.iteration }}
          MAX_RUNTIME_MINUTES: "340"
          MODEL: "gemini-3-flash-preview"
          GITHUB_TOKEN: ${{ secrets.BA_ACCESS_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          WORKFLOW_FILE: "longtask-lt-mma5l6dt-tsu2.yml"
        run: python -u scripts/longtask-runner.py