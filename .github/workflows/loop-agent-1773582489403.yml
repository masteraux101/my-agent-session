# browseragent-loop: loop-6d658f6a
name: "Loop Agent — loop-6d658f6a"

on:
  workflow_dispatch: {}

jobs:
  loop-agent:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.50.0-noble
      options: --ipc=host
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd loop-agent
          npm install pushoo telegraf @wecom/aibot-node-sdk zod @langchain/core @langchain/langgraph @langchain/google-genai @langchain/openai playwright@1.50.0 sharp 2>&1

      - name: Run loop agent
        env:
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          LOOP_KEY: "loop-6d658f6a"
          AI_PROVIDER: "gemini"
          AI_MODEL: "gemini-2.5-pro"
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PUSHOO_CHANNELS: ${{ secrets.PUSHOO_CHANNELS }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOP_WORKFLOW_FILE: "loop-agent-1773582489403.yml"
          LOOP_HISTORY_PATH: "loop-agent/history"
          LOOP_POLL_INTERVAL: "5"
          LOOP_MAX_RUNTIME: "18000"
          LOOP_ENCRYPT_KEY: ${{ secrets.LOOP_ENCRYPT_KEY }}
        run: node loop-agent/runner.js

